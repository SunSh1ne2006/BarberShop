<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="container">
        <div class="logo">БРИТВА</div>
        <nav class="nav-links" id="mainNav">
            <a href="index.html">Главная</a>
            <a href="services.html">Услуги</a>
            <a href="team.html">Команда</a>
            <a href="gallery.html">Галерея</a>
            <a href="quotes.html">Мудрость</a>
            <a href="contacts.html">Контакты</a>
        </nav>
        <a href="contacts.html#form" class="btn-record">ЗАПИСАТЬСЯ</a>
    </header>

    <section class="container" id="contacts">
        <h2 class="section-title">Приходи</h2>
        <div class="contacts-info">
            <p><strong>Адрес:</strong> ул. Настоящих Мужиков, 42, Москва</p>
            <p><strong>Телефон:</strong> <a href="tel:+79991234567">+7 (999) 123-45-67</a></p>
            <p><strong>Часы:</strong> Пн–Вс 10:00–22:00</p>
            <p><strong>Instagram:</strong> <a href="https://instagram.com/britva_barbershop" target="_blank">@britva_barbershop</a></p>
        </div>

        <h2 class="section-title" id="form">Записаться</h2>
        <form class="record-form">
            <input type="text" placeholder="Ваше имя" required>
            <input type="tel" placeholder="Телефон" required>
            <select>
                <option>Стрижка</option>
                <option>Бритьё</option>
                <option>Борода</option>
                <option>Комплекс «Мужской день»</option>
                <option>Детская стрижка</option>
                <option>Камуфляж седины</option>
            </select>
            <button type="submit" class="btn-record">ОТПРАВИТЬ ЗАЯВКУ</button>
        </form>
    </section>

    <footer>
        <div class="container">© 2026 Барбершоп «БРИТВА». Все права защищены. #БудьМужиком</div>
    </footer>
    <script src="script.js"></script>
